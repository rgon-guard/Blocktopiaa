<!DOCTYPE html>
<html>
<head>
<title>Blocktopia</title>

<style>
body{
margin:0;background:#2b2b2b;
font-family:Arial;color:white;
}

.title{
position:absolute;top:10px;left:10px;
color:#3b82f6;
}

.topRight{
position:absolute;top:10px;right:10px;
text-align:right;
}

.players{
position:absolute;top:60px;left:10px;right:10px;
height:22px;
background:#1f1f1f;
display:flex;gap:6px;
overflow-x:auto;
padding:4px;
border-radius:8px;
font-size:12px;
}

.player{
background:#333;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
white-space:nowrap;
}

.chatBox{
position:fixed;
bottom:10px;
right:10px;
width:320px;
height:360px;
background:#222;
display:none;
flex-direction:column;
border-radius:10px;
}

.chatHeader{
padding:6px;
background:#333;
display:flex;
justify-content:space-between;
}

.chatMessages{
flex:1;
overflow:auto;
padding:6px;
font-size:13px;
}

.chatInput{
display:flex;
}

.chatInput input{
flex:1;
padding:6px;
}
</style>
</head>

<body>

<div class="title">Blocktopia</div>

<div class="topRight">
<div id="userDisplay"></div>
<div id="pointsDisplay" style="color:gold;"></div>
</div>

<div class="players" id="players"></div>

<div class="chatBox" id="chatBox">
    <div class="chatHeader">
        <span id="chatWith"></span>
        <button onclick="closeChat()">X</button>
    </div>

    <div class="chatMessages" id="chatMessages"></div>

    <div class="chatInput">
        <input id="msgInput">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>

let me = "";
let chattingWith = "";

/* LOGIN DEMO */
me = "test";

/* LOAD PROFILE */
function loadProfile(){
fetch("/profile?username="+me)
.then(r=>r.json())
.then(d=>{
userDisplay.textContent="Logged in as: "+d.username;
pointsDisplay.textContent=d.points+" p";
});
}
loadProfile();

/* USERS */
function loadUsers(){
fetch("/users")
.then(r=>r.json())
.then(users=>{
players.innerHTML="";
users.forEach(u=>{
let d=document.createElement("div");
d.className="player";
d.textContent=u.username;
d.onclick=()=>openChat(u.username);
players.appendChild(d);
});
});
}
loadUsers();

/* CHAT */
function openChat(u){
chattingWith=u;
chatBox.style.display="flex";
chatWith.textContent=u;
loadMessages();
}

function closeChat(){
chatBox.style.display="none";
}

function loadMessages(){
fetch(`/get-messages?user1=${me}&user2=${chattingWith}`)
.then(r=>r.json())
.then(msgs=>{
chatMessages.innerHTML="";
msgs.forEach(m=>{
let d=document.createElement("div");
d.textContent=m.sender+": "+m.message;
chatMessages.appendChild(d);
});
});
}

/* SEND */
function sendMsg(){
let msg=msgInput.value;
if(!msg)return;

fetch("/send-message",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
sender:me,
receiver:chattingWith,
message:msg
})
}).then(()=>{
msgInput.value="";
loadMessages();
});
}

/* ENTER KEY */
document.addEventListener("keydown",e=>{
if(e.key==="Enter"&&chattingWith){
sendMsg();
}
});

</script>

</body>
</html>
