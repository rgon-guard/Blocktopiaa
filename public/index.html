<!DOCTYPE html>
<html>
<head>
    <title>Blocktopia</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #2b2b2b;
            font-family: Arial, sans-serif;
            overflow: hidden;
            filter: hue-rotate(3deg) saturate(1.01);
        }

        h1 {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px;
            color: #3b82f6;
        }

        button {
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .download {
            position: absolute;
            top: 40px;
            right: 40px;
            padding: 10px 18px;
            background: #444;
            color: white;
        }

        .usernameDisplay {
            position: absolute;
            top: 48px;
            right: 150px;
            font-size: 16px;
            color: white;
        }

        .play {
            position: absolute;
            top: 50%;
            left: 75%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            padding: 7px 60px;
            background: #22c55e;
            color: white;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
        }

        .accountBox {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            width: 300px;
            padding: 20px;
            background: #3a3a3a;
            border-radius: 12px;
            text-align: center;
        }

        .accountBox input {
            width: 90%;
            padding: 8px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
        }

        .confirmButton {
            margin-top: 15px;
            padding: 8px 20px;
            background: #22c55e;
            color: white;
        }
    </style>
</head>

<body>

<h1>Blocktopia</h1>

<button class="download">Download</button>

<div class="usernameDisplay" id="usernameDisplay"></div>

<button class="play" id="playButton" disabled>Play</button>

<div class="overlay" id="overlay"></div>

<div class="accountBox">
    <h2>Create Account</h2>

    <input type="text" id="usernameInput" placeholder="Username" maxlength="25">
    <input type="password" id="passwordInput" placeholder="Password">

    <button class="confirmButton" onclick="createAccount()">Confirm</button>
</div>

<script>
function createAccount() {
    const username = document.getElementById("usernameInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();

    fetch("/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            alert(data.message);
            return;
        }

        const display = document.getElementById("usernameDisplay");

        // ADMIN BADGE
        if (data.username === "admin") {
            display.innerHTML = `
                <span style="display:flex;align-items:center;gap:6px;">
                    <span style="
                        width:14px;
                        height:14px;
                        background:yellow;
                        border-radius:50%;
                        display:inline-block;
                    "></span>

                    <span style="color:gold;font-weight:bold;">A</span>

                    <span>${data.username}</span>
                </span>
            `;
        } else {
            display.textContent = data.username;
        }

        document.getElementById("overlay").style.display = "none";
        document.getElementById("playButton").disabled = false;
    });
}
</script>

</body>
</html>
