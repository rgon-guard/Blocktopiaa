<!DOCTYPE html>
<html>
<head>
<title>Blocktopia</title>

<style>
body {margin:0;background:#2b2b2b;font-family:Arial;color:white;overflow:hidden;}

.title{position:absolute;top:10px;left:10px;color:#3b82f6;font-weight:bold;}

.userTag{position:absolute;top:10px;right:120px;}

.players{
position:absolute;top:60px;left:10px;right:10px;height:40px;
background:#1f1f1f;display:flex;gap:8px;padding:4px;
overflow-x:auto;align-items:center;border-radius:10px;
}

.player{
background:#333;padding:4px 8px;border-radius:6px;
cursor:pointer;font-size:13px;display:flex;gap:5px;align-items:center;
}

.onlineDot{width:6px;height:6px;background:#22c55e;border-radius:50%;}

.chatBox{
position:fixed;bottom:10px;right:10px;width:320px;height:360px;
background:#222;border-radius:10px;display:none;flex-direction:column;
}

.chatHeader{background:#333;padding:8px;display:flex;justify-content:space-between;}

.chatMessages{flex:1;overflow:auto;padding:6px;font-size:13px;}

.chatInput{display:flex;}
.chatInput input{flex:1;padding:6px;}

.orange{color:orange;}

.adminA{
width:10px;height:10px;background:yellow;border-radius:50%;
display:inline-block;position:relative;
}
.adminA::after{
content:"A";position:absolute;top:-3px;left:2px;
color:gold;font-size:10px;font-weight:bold;
}

.panel{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
background:#3a3a3a;padding:20px;border-radius:12px;width:300px;}
</style>
</head>

<body>

<div class="title">Blocktopia</div>
<div class="userTag" id="userTag"></div>

<div class="players" id="players"></div>

<div class="chatBox" id="chatBox">
<div class="chatHeader">
<span id="chatWith"></span>
<button onclick="closeChat()">X</button>
</div>

<div class="chatMessages" id="chatMessages"></div>

<div class="chatInput">
<input id="msgInput">
<button onclick="sendMsg()">Send</button>
<button id="blockBtn" onclick="toggleBlock()">Block</button>
</div>
</div>

<div class="panel" id="login">
<input id="u">
<input id="p" type="password">
<button onclick="login()">Login</button>
</div>

<script>

let me="";
let chattingWith="";
let blocked=[];

/* LOGIN */
function login(){
fetch("/auth",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})})
.then(r=>r.json()).then(d=>{
if(!d.success)return;

me=d.username;

login.style.display="none";
userTag.textContent=me;

loadUsers();
setInterval(loadOnline,5000);
});
}

/* ONLINE */
function loadOnline(){
fetch("/online-users").then(r=>r.json()).then(o=>{
window.online=o;
});
}

/* USERS */
function loadUsers(){
fetch("/users").then(r=>r.json()).then(data=>{
players.innerHTML="";
data.forEach(u=>{

const div=document.createElement("div");
div.className="player";

/* COLORS */
if(u.username==="Kesm") div.classList.add("orange");

div.textContent=u.username;

/* ONLINE */
if(window.online?.includes(u.username)){
const d=document.createElement("div");
d.className="onlineDot";
div.appendChild(d);
}

div.onclick=()=>openChat(u.username);
players.appendChild(div);
});
});
}

/* CHAT */
function openChat(user){
chattingWith=user;
chatBox.style.display="flex";
chatWith.textContent=user;

loadMessages();
loadBlocked();
}

function closeChat(){chatBox.style.display="none";}

/* BLOCK */
function loadBlocked(){
fetch(`/blocked?user=${me}`)
.then(r=>r.json()).then(b=>{
blocked=b;
if(blocked.includes(chattingWith)){
chatMessages.innerHTML="you have blocked this user, unblock them to see their messages";
blockBtn.textContent="Unblock";
}else{
blockBtn.textContent="Block";
}
});
}

function toggleBlock(){
if(blocked.includes(chattingWith)){
fetch("/unblock-user",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:me,target:chattingWith})})
.then(()=>loadBlocked());
}else{
fetch("/block-user",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({user:me,target:chattingWith})})
.then(()=>loadBlocked());
}
}

/* MESSAGES */
function loadMessages(){
fetch(`/get-messages?user1=${me}&user2=${chattingWith}`)
.then(r=>r.json()).then(msgs=>{

chatMessages.innerHTML="";

msgs.forEach(m=>{
const div=document.createElement("div");

if(m.sender==="admin"){
div.innerHTML="👑 "+m.sender+": "+m.message;
}else{
div.textContent=m.sender+": "+m.message;
}

chatMessages.appendChild(div);
});
});
}

function sendMsg(){
fetch("/send-message",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({sender:me,receiver:chattingWith,message:msgInput.value})})
.then(()=>{msgInput.value="";loadMessages();});
}

</script>

</body>
</html>
