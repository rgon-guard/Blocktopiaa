<!DOCTYPE html>
<html>
<head>
    <title>Blocktopia</title>

    <style>
        body {
            margin: 0;
            background: #2b2b2b;
            font-family: Arial;
            overflow: hidden;
        }

        h1 {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #3b82f6;
            font-size: 18px;
        }

        .topbar {
            position: absolute;
            top: 10px;
            left: 120px;
            right: 120px;
            height: 40px;
            background: #1f1f1f;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px;
            overflow-x: auto;
        }

        .player {
            padding: 5px 10px;
            border-radius: 6px;
            background: #333;
            color: white;
            white-space: nowrap;
        }

        .download {
            position: absolute;
            right: 20px;
            top: 10px;
        }

        .settings {
            position: absolute;
            right: 120px;
            top: 10px;
        }

        .panel {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            background: #3a3a3a;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        input {
            display: block;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<h1>Blocktopia</h1>

<div class="topbar" id="topbar"></div>

<button class="download">Download</button>
<button class="settings" onclick="openSettings()">Settings</button>

<div class="panel" id="accountPanel">
    <h3 id="panelTitle">Create Account</h3>

    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">

    <button onclick="submit()">Confirm</button>
</div>

<div class="panel" id="settingsPanel">
    <h3>Settings</h3>
    <button onclick="openChangePass()">Change Password</button>
</div>

<div class="panel" id="changePassPanel">
    <h3>Change Password</h3>

    <input id="oldPass" placeholder="old password">
    <input id="newPass" placeholder="new password">

    <button onclick="changePassword()">Confirm</button>
</div>

<script>
let currentUser = null;

function loadPlayers(search="") {
    fetch("/users?search=" + search)
    .then(r => r.json())
    .then(data => {
        const bar = document.getElementById("topbar");
        bar.innerHTML = "";

        const show = data.slice(0,5);

        show.forEach(u => {
            const div = document.createElement("div");

            const len = u.username.length;

            let color = "white";
            if (len === 1) color = "blue";
            else if (len === 2) color = "yellow";
            else if (len === 3) color = "brown";

            div.className = "player";
            div.style.color = color;
            div.innerText = u.username;

            bar.appendChild(div);
        });
    });
}

function submit() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    fetch("/auth", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(r=>r.json())
    .then(d=>{
        if(!d.success) return;

        currentUser = username;

        document.getElementById("accountPanel").style.display="none";
        loadPlayers();
    });
}

function openSettings(){
    document.getElementById("settingsPanel").style.display="block";
}

function openChangePass(){
    document.getElementById("settingsPanel").style.display="none";
    document.getElementById("changePassPanel").style.display="block";
}

function changePassword(){
    const oldPassword = document.getElementById("oldPass").value;
    const newPassword = document.getElementById("newPass").value;

    fetch("/change-password", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            username: currentUser,
            oldPassword,
            newPassword
        })
    })
    .then(r=>r.json())
    .then(d=>{
        alert(d.success ? "Changed!" : "Failed");
    });
}

loadPlayers();
</script>

</body>
</html>
