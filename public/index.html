<!DOCTYPE html>
<html>
<head>
<title>Blocktopia</title>

<style>
body{margin:0;background:#2b2b2b;font-family:Arial;color:white;}

.title{position:absolute;top:10px;left:10px;color:#3b82f6;}

.players{
position:absolute;top:60px;left:10px;right:10px;
height:22px;background:#1f1f1f;
display:flex;gap:6px;overflow-x:auto;
padding:6px;border-radius:8px;
}

.player{
background:#333;padding:5px 10px;
border-radius:6px;cursor:pointer;
font-size:13px;
}

.chatBox{
position:fixed;bottom:10px;right:10px;
width:300px;height:350px;background:#222;
display:none;flex-direction:column;
border-radius:10px;
}

.chatHeader{
background:#333;padding:6px;
display:flex;justify-content:space-between;
}

.chatMessages{
flex:1;overflow:auto;padding:6px;
font-size:13px;
}

.chatInput{display:flex;}
.chatInput input{flex:1;padding:6px;}
</style>
</head>

<body>

<div class="title">Blocktopia</div>

<div class="players" id="players"></div>

<div class="chatBox" id="chatBox">
    <div class="chatHeader">
        <span id="chatWith"></span>
        <button onclick="closeChat()">X</button>
    </div>

    <div class="chatMessages" id="chatMessages"></div>

    <div class="chatInput">
        <input id="msgInput">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>

let me="";
let chattingWith="";

/* LOGIN SIMPLE */
fetch("/auth", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:"test",password:"123"})
});

/* USERS */
function loadUsers(){
fetch("/users")
.then(r=>r.json())
.then(data=>{
players.innerHTML="";
data.forEach(u=>{
let d=document.createElement("div");
d.className="player";
d.textContent=u.username;
d.onclick=()=>openChat(u.username);
players.appendChild(d);
});
});
}
loadUsers();

/* CHAT */
function openChat(u){
chattingWith=u;
chatBox.style.display="flex";
chatWith.textContent=u;
loadMessages();
}

function closeChat(){
chatBox.style.display="none";
}

function loadMessages(){
fetch(`/get-messages?user1=${me}&user2=${chattingWith}`)
.then(r=>r.json())
.then(msgs=>{
chatMessages.innerHTML="";
msgs.forEach(m=>{
let d=document.createElement("div");
d.textContent=m.sender+": "+m.message;
chatMessages.appendChild(d);
});
});
}

/* SEND */
function sendMsg(){
let msg=msgInput.value;
if(!msg)return;

fetch("/send-message",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
sender:me,
receiver:chattingWith,
message:msg
})
}).then(()=>{
msgInput.value="";
loadMessages();
});
}

/* ENTER KEY */
document.addEventListener("keydown",e=>{
if(e.key==="Enter" && chattingWith){
sendMsg();
}
});

</script>

</body>
</html>
