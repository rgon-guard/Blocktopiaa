<!DOCTYPE html>
<html>
<head>
<title>Blocktopia</title>

<style>
body {
    margin:0;
    background:#2b2b2b;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

.title {
    position:absolute;
    top:10px;
    left:10px;
    color:#3b82f6;
    font-weight:bold;
}

.userTag {
    position:absolute;
    top:10px;
    right:120px;
}

.players {
    position:absolute;
    top:60px;
    left:10px;
    right:10px;
    height:70px;
    background:#1f1f1f;
    display:flex;
    gap:8px;
    padding:8px;
    overflow-x:auto;
    border-radius:10px;
}

.player {
    background:#333;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    position:relative;
}

.dot {
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:2px;
    right:2px;
}

.chatBox {
    position:fixed;
    bottom:10px;
    right:10px;
    width:300px;
    height:350px;
    background:#222;
    border-radius:10px;
    display:none;
    flex-direction:column;
}

.chatHeader {
    background:#333;
    padding:8px;
    display:flex;
    justify-content:space-between;
}

.chatMessages {
    flex:1;
    overflow:auto;
    padding:6px;
}

.chatInput {
    display:flex;
}

.chatInput input {
    flex:1;
    padding:6px;
}

.overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.panel {
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:#3a3a3a;
    padding:20px;
    border-radius:12px;
    width:300px;
}
</style>
</head>

<body>

<div class="title">Blocktopia</div>
<div class="userTag" id="userTag"></div>

<div class="players" id="players"></div>

<div class="chatBox" id="chatBox">
    <div class="chatHeader">
        <span id="chatWith">Chat</span>
        <button onclick="closeChat()">X</button>
    </div>

    <div class="chatMessages" id="chatMessages"></div>

    <div class="chatInput">
        <input id="msgInput">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>

<div class="panel" id="login">
    <h3>Login</h3>
    <input id="u">
    <input id="p" type="password">
    <button onclick="login()">Confirm</button>
</div>

<script>
let me = "";
let chattingWith = "";

function login(){
    fetch("/auth",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        if(!d.success)return;

        me = d.username;

        overlay.style.display="none";
        login.style.display="none";

        userTag.textContent = me;

        loadUsers();
    });
}

function loadUsers(){
    fetch("/users")
    .then(r=>r.json())
    .then(data=>{
        players.innerHTML="";

        data.forEach(u=>{
            const d=document.createElement("div");
            d.className="player";
            d.textContent=u.username;

            d.onclick=()=>openChat(u.username);

            players.appendChild(d);
        });
    });
}

function openChat(user){
    chattingWith=user;
    chatBox.style.display="flex";
    chatWith.textContent=user;
    loadMessages();
}

function closeChat(){
    chatBox.style.display="none";
}

function loadMessages(){
    fetch(`/get-messages?user1=${me}&user2=${chattingWith}`)
    .then(r=>r.json())
    .then(msgs=>{
        chatMessages.innerHTML="";
        msgs.forEach(m=>{
            const div=document.createElement("div");
            div.textContent=`${m.sender}: ${m.message}`;
            chatMessages.appendChild(div);
        });
    });
}

function sendMsg(){
    fetch("/send-message",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            sender:me,
            receiver:chattingWith,
            message:msgInput.value
        })
    }).then(()=> {
        msgInput.value="";
        loadMessages();
    });
}
</script>

</body>
</html>
