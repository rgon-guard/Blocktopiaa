<!DOCTYPE html>
<html>
<head>
    <title>Blocktopia</title>

    <style>
        body {
            margin: 0;
            background: #2b2b2b;
            font-family: Arial;
            overflow: hidden;
            color: white;
        }

        h1 {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #3b82f6;
            font-size: 18px;
        }

        .topbar {
            position: absolute;
            top: 60px;
            left: 10px;
            right: 10px;
            height: 45px;
            background: #1f1f1f;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px;
            overflow-x: auto;
            border-radius: 10px;
        }

        .player {
            padding: 5px 10px;
            background: #333;
            border-radius: 6px;
            white-space: nowrap;
        }

        .play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 12px 50px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
        }

        .box {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            background: #3a3a3a;
            padding: 20px;
            border-radius: 12px;
            width: 280px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Blocktopia</h1>

<div class="topbar" id="topbar"></div>

<button class="play" id="play" disabled>Play</button>

<div class="overlay" id="overlay"></div>

<div class="box" id="loginBox">
    <h3>Create Account</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="submit()">Confirm</button>
</div>

<script>
let currentUser = null;

function submit() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    fetch("/auth", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ username, password })
    })
    .then(r => r.json())
    .then(d => {
        console.log("AUTH:", d);

        if (!d.success) {
            alert(d.message || "Failed");
            return;
        }

        currentUser = d.username;

        document.getElementById("overlay").style.display = "none";
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("play").disabled = false;

        loadUsers();
    })
    .catch(err => {
        console.error("FETCH ERROR:", err);
        alert("Server not reachable");
    });
}

function loadUsers(search="") {
    fetch("/users?search=" + search)
    .then(r => r.json())
    .then(data => {
        const bar = document.getElementById("topbar");
        bar.innerHTML = "";

        data.slice(0,5).forEach(u => {
            const div = document.createElement("div");
            div.className = "player";

            let len = u.username.length;
            let color = "white";

            if (len === 1) color = "blue";
            else if (len === 2) color = "yellow";
            else if (len === 3) color = "brown";

            div.style.color = color;
            div.textContent = u.username;

            bar.appendChild(div);
        });
    });
}

loadUsers();
</script>

</body>
</html>
