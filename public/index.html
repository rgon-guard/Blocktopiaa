<!DOCTYPE html>
<html>
<head>
    <title>Blocktopia</title>

    <style>
        body {
            margin: 0;
            background: #2b2b2b;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .title {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #3b82f6;
            font-size: 18px;
            font-weight: bold;
        }

        .usernameDisplay {
            position: absolute;
            top: 12px;
            right: 120px;
            font-size: 16px;
        }

        .settingsButton {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
        }

        .play {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #22c55e;
            color: white;
            font-size: 28px;
            padding: 10px 60px;
        }

        .playerContainer {
            position: absolute;
            top: 60px;
            left: 10px;
            right: 10px;
            height: 70px;
            background: #1f1f1f;
            border-radius: 10px;
            padding: 10px;
        }

        .searchBar {
            width: 220px;
            padding: 6px;
            border-radius: 6px;
            border: none;
        }

        .players {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            overflow-x: auto;
        }

        .player {
            background: #333;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
        }

        .panel {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #3a3a3a;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
        }

        .panel input {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            box-sizing: border-box;
        }

        .panel button {
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }

        .dropdown {
            position: fixed;
            background: #444;
            border-radius: 8px;
            padding: 8px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="title">Blocktopia</div>

<div class="usernameDisplay" id="usernameDisplay"></div>

<button class="settingsButton" onclick="openSettings()">
    Settings
</button>

<div class="playerContainer">
    <input
        class="searchBar"
        id="searchInput"
        placeholder="Search users..."
        oninput="loadUsers()"
    >

    <div class="players" id="players"></div>
</div>

<button class="play" id="playButton" disabled>
    Play
</button>

<div class="overlay" id="overlay"></div>

<div class="panel" id="loginPanel">
    <h2>Create Account / Login</h2>

    <input id="usernameInput" placeholder="Username" maxlength="25">
    <input id="passwordInput" type="password" placeholder="Password">

    <button onclick="login()">Confirm</button>
</div>

<div class="panel hidden" id="settingsPanel">
    <h2>Settings</h2>

    <button onclick="openPasswordPanel()">
        Change Password
    </button>

    <br><br>

    <button onclick="closeSettings()">
        Close
    </button>
</div>

<div class="panel hidden" id="passwordPanel">
    <h2>Change Password</h2>

    <input
        id="oldPasswordInput"
        type="password"
        placeholder="Old Password"
    >

    <input
        id="newPasswordInput"
        type="password"
        placeholder="New Password"
    >

    <button onclick="changePassword()">
        Confirm
    </button>

    <button onclick="closePasswordPanel()">
        Back
    </button>
</div>

<div class="dropdown" id="dropdown"></div>

<script>
let currentUser = "";
let currentRole = "";

function usernameColor(name) {
    if (name.length === 1) return "blue";
    if (name.length === 2) return "yellow";
    if (name.length === 3) return "brown";
    return "white";
}

function login() {
    const username =
        document.getElementById("usernameInput").value.trim();

    const password =
        document.getElementById("passwordInput").value;

    fetch("/auth", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            password
        })
    })
    .then(r => r.json())
    .then(data => {

        if (!data.success) {
            alert(data.message || "Failed");
            return;
        }

        currentUser = data.username;
        currentRole = data.role || "user";

        document.getElementById("usernameDisplay").textContent =
            currentUser;

        document.getElementById("overlay").style.display = "none";
        document.getElementById("loginPanel").style.display = "none";

        document.getElementById("playButton").disabled = false;

        loadUsers();
    })
    .catch(err => {
        console.error(err);
        alert("Login failed.");
    });
}

function loadUsers() {

    const search =
        document.getElementById("searchInput").value;

    fetch("/users?search=" + encodeURIComponent(search))
    .then(r => r.json())
    .then(users => {

        const container =
            document.getElementById("players");

        container.innerHTML = "";

        users.slice(0, 5).forEach(user => {

            const username =
                user.username || user;

            const div =
                document.createElement("div");

            div.className = "player";
            div.textContent = username;
            div.style.color = usernameColor(username);

            div.onclick = (e) => {

                if (currentRole !== "admin")
                    return;

                openDropdown(
                    e.clientX,
                    e.clientY,
                    username
                );
            };

            container.appendChild(div);
        });
    });
}

function openDropdown(x, y, username) {

    const dropdown =
        document.getElementById("dropdown");

    dropdown.style.display = "block";
    dropdown.style.left = x + "px";
    dropdown.style.top = y + "px";

    dropdown.innerHTML = `
        <div>${username}</div>
        <button onclick="deleteUser('${username}')">
            Delete Account
        </button>
    `;
}

document.addEventListener("click", () => {
    document.getElementById("dropdown").style.display =
        "none";
});

function deleteUser(username) {

    fetch("/delete-user", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            adminUser: currentUser,
            target: username
        })
    })
    .then(r => r.json())
    .then(() => {
        loadUsers();
    });
}

function openSettings() {
    document.getElementById("settingsPanel")
        .classList.remove("hidden");
}

function closeSettings() {
    document.getElementById("settingsPanel")
        .classList.add("hidden");
}

function openPasswordPanel() {

    closeSettings();

    document.getElementById("passwordPanel")
        .classList.remove("hidden");
}

function closePasswordPanel() {

    document.getElementById("passwordPanel")
        .classList.add("hidden");
}

function changePassword() {

    const oldPassword =
        document.getElementById("oldPasswordInput").value;

    const newPassword =
        document.getElementById("newPasswordInput").value;

    fetch("/change-password", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: currentUser,
            oldPassword,
            newPassword
        })
    })
    .then(r => r.json())
    .then(data => {

        if (data.success) {
            alert("Password changed.");
            closePasswordPanel();
        } else {
            alert(data.message || "Failed.");
        }
    });
}
</script>

</body>
</html>
