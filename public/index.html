<script>

let me = "";
let chattingWith = "";
let online = [];

/* LOGIN (FIXED + SAFE) */
function login() {

    const username = document.getElementById("u").value.trim();
    const password = document.getElementById("p").value;

    if (!username || !password) {
        alert("Fill both fields");
        return;
    }

    fetch("/auth", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    })
    .then(r => r.json())
    .then(d => {

        if (!d.success) {
            alert(d.message || "Login failed");
            return;
        }

        me = d.username;

        // SAFE UI SWITCH
        const loginPanel = document.getElementById("login");
        if (loginPanel) loginPanel.style.display = "none";

        document.getElementById("userTag").textContent = me;

        loadUsers();
        loadOnline();

        setInterval(loadOnline, 5000);
    })
    .catch(err => {
        console.error("LOGIN ERROR:", err);
        alert("Server not responding");
    });
}

/* ONLINE USERS */
function loadOnline() {
    fetch("/online-users")
        .then(r => r.json())
        .then(data => {
            online = data;
        })
        .catch(() => {});
}

/* USERS */
function loadUsers() {
    fetch("/users")
        .then(r => r.json())
        .then(data => {

            const box = document.getElementById("players");
            box.innerHTML = "";

            data.forEach(u => {

                const div = document.createElement("div");
                div.className = "player";

                // special color fix
                if (u.username === "Kesm") {
                    div.style.color = "orange";
                } else {
                    div.style.color = "white";
                }

                div.textContent = u.username;

                // ONLINE DOT FIX
                if (online.includes(u.username)) {
                    const dot = document.createElement("div");
                    dot.className = "onlineDot";
                    div.appendChild(dot);
                }

                div.onclick = () => openChat(u.username);

                box.appendChild(div);
            });
        })
        .catch(err => {
            console.error("USER LOAD ERROR:", err);
        });
}

/* CHAT OPEN */
function openChat(user) {
    chattingWith = user;

    document.getElementById("chatBox").style.display = "flex";
    document.getElementById("chatWith").textContent = user;

    loadMessages();
}

/* CLOSE CHAT */
function closeChat() {
    document.getElementById("chatBox").style.display = "none";
}

/* MESSAGES */
function loadMessages() {

    fetch(`/get-messages?user1=${me}&user2=${chattingWith}`)
        .then(r => r.json())
        .then(msgs => {

            const box = document.getElementById("chatMessages");
            box.innerHTML = "";

            msgs.forEach(m => {

                const div = document.createElement("div");

                if (m.sender === "admin") {
                    div.innerHTML = "👑 <b>admin</b>: " + m.message;
                } else {
                    div.textContent = m.sender + ": " + m.message;
                }

                box.appendChild(div);
            });
        });
}

/* SEND MESSAGE */
function sendMsg() {

    const input = document.getElementById("msgInput");
    const msg = input.value.trim();

    if (!msg || !chattingWith) return;

    fetch("/send-message", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            sender: me,
            receiver: chattingWith,
            message: msg
        })
    })
    .then(() => {
        input.value = "";
        loadMessages();
    });
}

</script>
