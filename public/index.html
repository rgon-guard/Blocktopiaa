<!DOCTYPE html>
<html>
<head>
    <title>Blocktopia</title>

    <style>
        body {
            margin: 0;
            background: #2b2b2b;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
        }

        .title {
            color: #3b82f6;
            font-weight: bold;
        }

        .userTag {
            position: absolute;
            top: 40px;
            left: 10px;
            color: #aaa;
        }

        .topbar {
            position: absolute;
            top: 70px;
            left: 10px;
            right: 10px;
            height: 50px;
            background: #1f1f1f;
            display: flex;
            gap: 10px;
            padding: 5px;
            overflow-x: auto;
            border-radius: 10px;
        }

        .player {
            padding: 5px 10px;
            background: #333;
            border-radius: 6px;
            cursor: pointer;
        }

        .dropdown {
            position: absolute;
            background: #444;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 12px 50px;
            background: #22c55e;
            border-radius: 10px;
        }

        .panel {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            background: #3a3a3a;
            padding: 20px;
            border-radius: 12px;
            display: none;
            width: 300px;
        }

        input {
            width: 90%;
            margin: 6px 0;
            padding: 6px;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="title">Blocktopia</div>
    <button onclick="openSettings()">Settings</button>
</div>

<div class="userTag" id="userTag"></div>

<div class="topbar" id="topbar"></div>

<div class="dropdown" id="dropdown"></div>

<button class="play">Play</button>

<!-- LOGIN -->
<div id="login" class="panel" style="display:block;">
    <h3>Login</h3>
    <input id="u" placeholder="username">
    <input id="p" type="password" placeholder="password">
    <button onclick="login()">Confirm</button>
</div>

<!-- SETTINGS -->
<div class="panel" id="settings">
    <h3>Settings</h3>
    <button onclick="openChange()">Change Password</button>
</div>

<!-- CHANGE PASS -->
<div class="panel" id="change">
    <h3>Change Password</h3>
    <input id="old">
    <input id="new">
    <button onclick="changePass()">Confirm</button>
</div>

<script>
let currentUser = null;
let role = null;

function login(){
    fetch("/auth",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            username: u.value,
            password: p.value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        if(!d.success) return;

        currentUser = d.username;
        role = d.role;

        document.getElementById("login").style.display="none";
        document.getElementById("userTag").innerText =
            "Logged in as: " + currentUser + " (" + role + ")";

        loadUsers();
    });
}

function loadUsers(search=""){
    fetch("/users?search="+search)
    .then(r=>r.json())
    .then(data=>{
        const bar = document.getElementById("topbar");
        bar.innerHTML="";

        data.slice(0,5).forEach(u=>{
            const div = document.createElement("div");
            div.className="player";
            div.innerText=u.username;

            div.onclick=()=>{
                if(role==="admin"){
                    showDropdown(u.username, div);
                }
            };

            bar.appendChild(div);
        });
    });
}

function showDropdown(target, el){
    const d = document.getElementById("dropdown");
    d.style.display="block";
    d.style.left = el.getBoundingClientRect().left + "px";
    d.style.top = "120px";

    d.innerHTML = `
        <div>Admin Options</div>
        <button onclick="deleteUser('${target}')">Delete</button>
    `;
}

function deleteUser(target){
    fetch("/delete-user",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            adminUser: currentUser,
            target
        })
    }).then(()=>loadUsers());
}

function openSettings(){
    document.getElementById("settings").style.display="block";
}

function openChange(){
    document.getElementById("settings").style.display="none";
    document.getElementById("change").style.display="block";
}

function changePass(){
    fetch("/change-password",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            username: currentUser,
            oldPassword: old.value,
            newPassword: new.value
        })
    });
}
</script>

</body>
</html>
